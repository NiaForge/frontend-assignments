<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .ham-label {
            background-color: aqua;
            width: 100px;
            height: 100px;
            display: block;

            position: relative;
        }

        .ham-label .line {
            background-color: black;
            width: 80%;
            height: 10px;

            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            transition: 0.2s;
        }

        .ham-label .line-1 {
            top: 25%;
        }

        .ham-label .line-2 {
            top: 50%;
        }

        .ham-label .line-3 {
            top: 75%;
        }

        #ham-switch:checked+label .line-1 {
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        #ham-switch:checked+label .line-2 {
            display: none;
        }

        #ham-switch:checked+label .line-3 {
            top: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
        }
    </style>
</head>

<body>
    <input type="checkbox" id="ham-switch" hidden>
    <!-- 1. for 屬性：負責「邏輯連線」 -->
    <!-- 2. class 屬性：負責「外觀化妝」 -->
    <label for="ham-switch" class="ham-label">
        <div class="line line-1"></div>
        <div class="line line-2"></div>
        <div class="line line-3"></div>
    </label>
</body>

</html>
