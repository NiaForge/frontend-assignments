<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: azure;
            margin: 0;
        }
        .nav {
            /* background-color: black; */
            width: calc(80% - 20px * 2);
            height: calc(100px - 10px * 2);
            /* 為了固定使用 position: fixed;
            所以刪除 margin: auto; */
            position: fixed;
            left: 10%;
            top: 0;

            padding: 10px 20px;
        }

        .nav-logo-all {
            /* background-color: aqua; */
            width: 188px;
            height: 80px;
            float: left;
        }

        .logo {
            background-color: aqua;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-size: cover;
            float: left;
            margin-right: 10px;

            border: 2px solid white;
            transition: 2s;
        }

        .logo:hover {
            transform: ;
            transform: scale(1.5) rotatey(180deg);
        }

        .logo-1 {
            background-image: url(./img/man-3.jpg);
        }

        .logo-2 {
            background-image: url(./img/man-2.jpg);
            background-position: 0 -3px;
        }

        

        .logo-1:hover {
            background-image: url(./img/man-3-E.jpg);
        }

        .logo-2:hover {
            background-image: url(./img/man-2-E.jpg);
        }

        .nav-btn-all {
            /* background-color: brown; */
            width: 330PX;
            height: 50px;
            float: right;
            margin-top: 10px;
        }

        .nav-btn {
            background-color: palevioletred;
            width: 100PX;
            height: 50px;
            float: left;
            margin-left: 10px;

            font-size: 32px;
            color: blueviolet;
            text-align: center;
            line-height: 50px;
            border-radius: 10px;
        }

        .nav-btn:hover {
            color: red;
        }

        .all {
            background-color: blanchedalmond;
            width: 80%;
            height: 2000px;
            /* 記得置中 */
            margin: auto;
        }



        .banner {
            background-color: blue;
            width: 100%;
            height: 50vh;
            margin: auto;

            padding-top: 50vh;
            background-attachment: fixed;


            background-size: cover;
            background-repeat: no-repeat;
            background-position: top;
        }

        .banner-1 {
            background-image: url(./img/top.jpg);
        }

        .banner-2 {
            background-image: url(./img/mid.jpg);
        }

        .banner-3 {
            background-image: url(./img/btm.jpg);
        }

        .mask {
            background: linear-gradient(to top, black, palevioletred);
            width: 100%;
            height: 50vh;
            opacity: 0.5;

            position: relative;
        }

        .btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            background-color: palevioletred;
            font-size: 32px;
            color: black;
            text-align: center;
            border-radius: 10px;
            padding: 0 10px;
        }


        .go-top {
            background-color: black;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: fixed;
            right: 10%;
            bottom: 10%;
            transform: translateX(-50px);

            text-align: center;
            line-height: 100px;
            font-size: 48px;
            border: 2px solid palevioletred;

            transition: 0.2s;
        }

        .go-top:hover {
            transform: scale(1.2);
        }

    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-logo-all">
            <div class="logo logo-1"></div>
            <div class="logo logo-2"></div>
        </div>
        
        <div class="nav-btn-all">
            <a href="#banner-1">
            <div class="nav-btn nav-btn-1">˚♫︎º</div>
            </a>

            <a href="#banner-2">
            <div class="nav-btn nav-btn-2">❤︎°·</div>
            </a>

            <a href="#banner-3">
            <div class="nav-btn nav-btn-3">｡★⁺</div>
            </a>
        </div>
    </div>
    <div class="all">
        <div id="banner-1" class="banner banner-1">
            <div class="mask">
                <div class="btn btn-1">
                    <p>- ALiEN<br>STAGE -</p>
                </div>
            </div>
        </div>
        <div id="banner-2"class="banner banner-2">
            <div class="mask">
                <div class="btn btn-2">
                    <p>- SWEET<br>DREAM -</p>
                </div>
            </div>
        </div>
        <div id="banner-3" class="banner banner-3">
            <div class="mask">
                <div class="btn btn-3">
                    <p> - Mizi & Sua - </p>
                </div>
            </div>
            
        </div>
    </div>

    <a href="#">
    <div class="go-top">🔝</div>
    </a>
</body>
</html>
